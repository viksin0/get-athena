name: Athena access request
description: Request read access to the private Athena distribution and starter repositories.
title: "[Access request] "
labels:
  - access-request
assignees:
  - viksin0
body:
  - type: markdown
    attributes:
      value: |
        Microsoft EMU accounts cannot create issues in repositories outside the enterprise. Submit this form while signed into a personal GitHub account, then enter the Microsoft EMU username that should receive access below.

        This issue is public. Do not include email addresses, customer information, credentials, or other confidential data.
  - type: input
    id: github-username
    attributes:
      label: Microsoft EMU GitHub username
      description: Enter the GitHub username you use with Microsoft EMU, not a personal GitHub account.
      placeholder: your-managed-github-username
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Intended use
      description: Briefly describe your non-confidential reason for using Athena.
      placeholder: I plan to use Athena for...
    validations:
      required: true
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgements
      options:
        - label: The Microsoft EMU username above is the managed identity that should receive access.
          required: true
        - label: I will not redistribute repository content or release artifacts outside Microsoft.
          required: true
